  function calcAverage(produkt){

  let total = 0;

  let tage = 0;

  historyData.forEach(h=>{

    if(produkt==="agf" && h.agf>0){

      total += h.agf;

      tage++;
    }

    if(produkt==="mlf" && h.mlf>0){

      total += h.mlf;

      tage++;
    }

  });

  if(tage<=0) return 0;

  return total / tage;
}

function calcResttage(produkt){

  let avg = calcAverage(produkt);

  if(avg<=0) return 999;

  let tage =
  lagerData[produkt].bestand / avg;

  if(tage < 0)
    return 0;

  return tage;
}

function getEasterSunday(year){

  let f = Math.floor,
  G = year % 19,
  C = f(year / 100),
  H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
  I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
  J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7,
  L = I - J,
  month = 3 + f((L + 40) / 44),
  day = L + 28 - 31 * f(month / 4);

  return new Date(year, month - 1, day);
}

function formatHolidayDate(date){

  let tag =
  String(date.getDate()).padStart(2,"0");

  let monat =
  String(date.getMonth()+1).padStart(2,"0");

  return `${tag}.${monat}`;
}

function getFeiertage(year,bundesland){

  let easter =
  getEasterSunday(year);

  let feiertage = [

    "01.01",
    "01.05",
    "03.10",
    "25.12",
    "26.12"

  ];

  function addDays(base,days){

    let d = new Date(base);

    d.setDate(d.getDate()+days);

    return formatHolidayDate(d);
  }

  feiertage.push(addDays(easter,-2)); // Karfreitag
  feiertage.push(addDays(easter,1));  // Ostermontag
  feiertage.push(addDays(easter,39)); // Himmelfahrt
  feiertage.push(addDays(easter,50)); // Pfingstmontag

  if([
    "Bayern",
    "Baden-Württemberg",
    "Hessen",
    "Nordrhein-Westfalen",
    "Rheinland-Pfalz",
    "Saarland"
  ].includes(bundesland)){

    feiertage.push(addDays(easter,60)); // Fronleichnam
  }

  return feiertage;
}

function isFeiertag(date){

  let jahr =
  date.getFullYear();

  let heute =
  formatHolidayDate(date);

  let feiertage =
  getFeiertage(
    jahr,
    globalCfg.bundesland
  );

  return feiertage.includes(heute);
}

function isWochenende(date){
  

  let tag = date.getDay();

  return tag===0 || tag===6;
}
  function isArbeitstag(date){

  if(isWochenende(date))
    return false;

  if(isFeiertag(date))
    return false;

  return true;
}

function addArbeitstage(starttage,arbeitstage){

  
  let d = new Date(starttage);

  let count = 0;

  while(count < arbeitstage){

    d.setDate(d.getDate()+1);

    if(isArbeitstag(d)){
      count++;
    }
  }

  return d;
}

  function getLeerDatum(produkt){
  let avg =
  calcAverage(produkt);

  if(avg<=0)
    return null;

  let tage =
  calcResttage(produkt);

  let d =
  new Date();

  d.setDate(
    d.getDate() +
    Math.floor(tage)
  );

  return d;
}

  function getBestellDatum(produkt){

  let leer =
  getLeerDatum(produkt);

  if(!leer)
    return null;

  let lieferzeit =
  lagerData[produkt].lieferzeit || 0;

  let d =
  new Date(leer);

  let count = 0;

  while(count < lieferzeit){

    d.setDate(d.getDate()-1);

    if(isArbeitstag(d)){
      count++;
    }
  }

  return d;
}

  function formatDatum(date){

  if(!date)
    return "-";

  return date.toLocaleDateString(
    "de-DE",
    {
      weekday:"long",
      day:"2-digit",
      month:"2-digit",
      year:"numeric"
    }
  );
}

  function getWarnClass(produkt){

  let tage =
  calcResttage(produkt);

  let bestell =
  getBestellDatum(produkt);

  let heute =
  new Date();

  heute.setHours(0,0,0,0);

  if(bestell){

    let b =
    new Date(bestell);

    b.setHours(0,0,0,0);

    let diff =
    Math.ceil(
      (b - heute)
      / (1000*60*60*24)
    );

    if(
      diff <=
      lagerData[produkt].rot
    ){
      return "warn-red";
    }
  }

  if(
    tage <=
    lagerData[produkt].orange
  ){
    return "warn-orange";
  }

  return "warn-green";
}
/* === RESTMISCHUNG BULLEN === */
function buildRestBullen(){
  let el=document.getElementById("calc");
  let cow=data.kuehe.items;
  let total=0;
  cow.forEach(i=>total+=i.kg);

  let rest=data.restbullen.rest;
  let ziel=data.restbullen.ziel;

  let rows="";
let lauf = rest;
  

let bull = data.bullen.items;

cow.forEach(it=>{

  if(it.kg<=0) return;

  // AGF / MLF nur wenn bei Bullen vorhanden UND kg > 0
  if(it.type==="agf" || it.type==="mlf"){
    let exists = bull.some(b => b.type===it.type && b.kg>0);
    if(!exists) return;
  }

let bullItem = bull.find(b=>{
  if(it.type && b.type) return it.type===b.type;
  return b.name===it.name;
});

let soll = bullItem
  ? bullItem.kg * (data.restbullen.anz || ziel / (bullItem.kg||1))
  : 0;

let anteil = it.kg / total;
let ist = anteil * rest;

let diff = soll - ist;

let zeit = "-";
  
if(it.type==="agf")
zeit=`<span class="agf">${fmt(Math.abs(diff)/globalCfg.agfKg)}</span>`;

if(it.type==="mlf")
zeit=`<span class="mlf">${fmt(Math.abs(diff)/globalCfg.mlfKg)}</span>`;


  lauf += diff;
let summe = lauf;
  

  let cls = diff >= 0 ? "plus" : "minus";

    it.type==="agf" ? globalCfg.agfName :

rows += `
<tr>
<td>${name}</td>

<td class="${cls}">${summe.toFixed(1)}</td>
</tr>`;
});

  el.innerHTML+=`

      onblur="buildCalc()">

<br><br>

Bullen (Anzahl)

value="${data.restbullen.anz}"
onblur="

data.bullen.items.forEach(i=>{

buildCalc();
">

class="save-btn
${alreadySavedToday('bullen')?'saved':''}"

onclick="saveHistory('bullen')">

${alreadySavedToday('bullen')

}

let resttage = calcResttage(produkt);

let warn =
getWarnClass(produkt);

if(warn !== "warn-red")

function addLieferung(){

  let produkt =
  document.getElementById("liefer-produkt").value;

  let datum =
  document.getElementById("liefer-datum").value;

  let menge =
  num(document.getElementById("liefer-menge").value);

  if(menge<=0){

    alert("Menge fehlt");

    return;
  }

  let eintrag = {

    id:
    Date.now()+
    Math.random().toString(36).substr(2,5),

    produkt:produkt,

    datum:formatDateInput(datum),

    menge:menge
  };

  lieferungen.unshift(eintrag);

  lagerData[produkt].bestand += menge;

  saveLieferungen();

  saveLagerStorage();

  buildHistory();

  buildCalc();

  alert("Lieferung gespeichert");
}

function deleteLieferung(id){

  let eintrag =
  lieferungen.find(l=>l.id===id);

  if(!eintrag) return;

  lagerData[eintrag.produkt].bestand -=
  eintrag.menge;

  lieferungen =
  lieferungen.filter(l=>l.id!==id);

  saveLieferungen();

  saveLagerStorage();

  buildHistory();

  buildCalc();

  alert("Lieferung gelöscht");
}

function deleteHistory(id){

  let eintrag =
  historyData.find(h=>h.id===id);

  if(!eintrag) return;

  lagerData.agf.bestand +=
  eintrag.agf || 0;

  lagerData.mlf.bestand +=
  eintrag.mlf || 0;

  historyData =
  historyData.filter(h=>h.id!==id);

  saveHistoryStorage();

  saveLagerStorage();

  buildHistory();

  buildCalc();

  alert("Tageslog gelöscht");
}

function getLogsByKategorie(cat){

  return getLogsByKategorie(cat)

}

/* === CALCULATOR === */
let expr="",history=JSON.parse(localStorage.getItem("calcHist"))||[];

  let historyWarnClass = "";

function press(v){
  if(v==="C"){expr="";update();return;}

  if(v==="⌫"){
    expr = expr.slice(0,-1);
    update();
    return;
  }

  if(v==="="){
    try{
      let r=eval(expr);
      history.unshift(expr+" = "+r);
      history=history.slice(0,20);
      localStorage.setItem("calcHist",JSON.stringify(history));
      expr=""+r;
    }catch{expr="";}
    update();renderHist();return;
  }

  expr+=v;
  update();
}

  
function update(){document.getElementById("disp").innerText=expr||"0";}
function renderHist(){document.getElementById("hist").innerHTML=history.map(h=>"<div>"+h+"</div>").join("");}
function buildCalc2(){
  document.getElementById("calc2").innerHTML=`
  <div class="calc-box">
  <div id="disp" class="calc-display">0</div>
  <div class="calc-grid">
  ${["7","8","9","/","4","5","6","*","1","2","3","-","C","0",".","⌫","=","+"]
  .map(v=>`<button class="calc-btn ${v=="="? "eq": "+-*/".includes(v)? "op": v=="C"? "clear": ""}"
  onclick="press('${v}')">${v}</button>`).join("")}
  </div><div id="hist" class="calc-history"></div></div>`;
  renderHist();
}
